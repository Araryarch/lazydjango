name: Build & Release

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json
    
    - name: Install npm dependencies
      run: |
        cd ui && npm ci || npm install
    
    - name: Build Next.js UI
      run: |
        cd ui && npm run build
    
    - name: Upload UI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ui-dist
        path: ui/out
        retention-days: 7

  build-wheel:
    name: Build Wheel on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: build-ui
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Download UI artifacts
      uses: actions/download-artifact@v4
      with:
        name: ui-dist
        path: lazydjango/ui/out
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build Python package
      run: |
        python -m build --wheel
    
    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist/
        retention-days: 7

  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: build-wheel
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Download wheel artifact
      uses: actions/download-artifact@v4
      with:
        name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
        path: dist
    
    - name: Download UI artifacts
      uses: actions/download-artifact@v4
      with:
        name: ui-dist
        path: lazydjango/ui/out
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install click rich fastapi uvicorn pydantic jinja2 django pytest pytest-cov build
    
    - name: Install wheel
      shell: bash
      run: |
        if ls dist/*.whl 1> /dev/null 2>&1; then
          pip install dist/*.whl --force-reinstall
        else
          pip install -e .
        fi
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=lazydjango --cov-report=xml --cov-report=term || true
    
    - name: Verify full installation
      run: |
        python -c "import lazydjango; print('Version:', lazydjango.__version__)"
        python -c "from lazydjango.cli import main; print('CLI import OK')"
        python -c "from lazydjango.api.views import app; print('API import OK')"
        python -c "from lazydjango.generators.model_gen import ModelGenerator; print('Generators OK')"

  release:
    name: Release
    needs: [build-wheel, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Download wheel artifact
      uses: actions/download-artifact@v4
      with:
        name: wheel-ubuntu-latest-py3.12
        path: dist
    
    - name: List artifacts
      shell: bash
      run: ls -la dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
