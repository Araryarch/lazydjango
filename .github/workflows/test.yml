name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install linting tools
      run: pip install ruff black
    
    - name: Run ruff
      run: ruff check lazydjango/
    
    - name: Run black check
      run: black --check lazydjango/

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install security tools
      run: pip install safety bandit pip-audit
    
    - name: Run safety check
      run: safety check || true
    
    - name: Run bandit
      run: bandit -r lazydjango/ || true
    
    - name: Run pip-audit
      run: pip-audit --desc || true

  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install click rich fastapi uvicorn pydantic jinja2 django pytest pytest-cov
    
    - name: Install package
      run: pip install -e .
    
    - name: Run tests
      run: pytest tests/ -v || true
    
    - name: Verify imports
      run: |
        python -c "import lazydjango; print('OK:', lazydjango.__version__)"
        python -c "from lazydjango.cli import main; print('CLI OK')"
        python -c "from lazydjango.api.views import app; print('API OK')"
